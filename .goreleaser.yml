version: 2

project_name: lnav-cli

builds:
  - id: lnav-cli
    binary: lnav-cli
    main: .
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/MonsterChenzhuo/lnav-cli/internal/build.Version={{ .Version }}
      - -X github.com/MonsterChenzhuo/lnav-cli/internal/build.Commit={{ .ShortCommit }}
      - -X github.com/MonsterChenzhuo/lnav-cli/internal/build.Date={{ .CommitDate }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "lnav-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - README.zh.md
      - LICENSE
      - CHANGELOG.md
      - src: skills/**/*
        dst: skills

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "merge "

release:
  draft: false
  prerelease: auto
  make_latest: true
