name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.0"

jobs:
  fast-gate:
    name: build · vet · fmt · tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt changes needed:"
            echo "$diff"
            exit 1
          fi

      - name: go mod tidy check
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go.mod / go.sum are not tidy"
            git --no-pager diff go.mod go.sum
            exit 1
          fi

  unit-test:
    name: unit + dry-run E2E
    needs: fast-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./internal/... ./cmd/...

      - name: dry-run E2E
        run: go test -race -count=1 ./tests/e2e/dryrun/...

      - name: coverage summary
        if: always()
        run: |
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -n 20 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: golangci-lint
    needs: fast-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6
          args: --timeout=5m

  skills-check:
    name: skills frontmatter
    needs: fast-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: skills-check
        run: bash scripts/skills-check.sh

  results:
    name: ci results (branch protection gate)
    needs: [fast-gate, unit-test, lint, skills-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: verify all jobs passed
        run: |
          if [ "${{ needs.fast-gate.result }}" != "success" ] || \
             [ "${{ needs.unit-test.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.skills-check.result }}" != "success" ]; then
            echo "::error::one or more CI jobs failed"
            exit 1
          fi
